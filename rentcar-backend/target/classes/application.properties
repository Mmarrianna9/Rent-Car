spring.application.name=rentcar-backend

# Configurazione Database: se rileva le variabili del cloud usa quelle, altrimenti va in localhost
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=true
spring.datasource.username=${DB_USER:}
spring.datasource.password=${DB_PASSWORD:}

# Driver e Dialetto per evitare l'errore "Unable to determine Dialect"
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Gestione tabelle: valida la struttura (cambia in 'update' se vuoi che Spring crei le tabelle da solo)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# Configurazione Motore AI Python
ai.engine.url=${AI_URL:https://rent-car-ai-engine.onrender.com}