spring.application.name=rentcar-backend

# Configurazione Database: se rileva le variabili del cloud usa quelle, altrimenti va in localhost
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:rent_car}?createDatabaseIfNotExist=true&useSSL=true&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# Driver e Dialetto per evitare l'errore "Unable to determine Dialect"
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Gestione tabelle: valida la struttura (cambia in 'update' se vuoi che Spring crei le tabelle da solo)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true