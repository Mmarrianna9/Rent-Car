spring.application.name=rentcar-backend

# Se rileva le variabili del cloud usa quelle, altrimenti usa localhost (il tuo PC)
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:rent_car}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# Valida la struttura del database senza modificarla o cancellarla
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true